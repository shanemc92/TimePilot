name: Build and publish image

# Runs on: pushes to main (tags :latest), and version tags like v1.2.0
# (tags :v1.2.0 and :1.2.0 too). Nothing runs on pull requests, so forks/PRs
# can't push images to your registry.
on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  schedule:
    # Rebuilds :latest weekly even with zero code changes, so it picks up
    # upstream python:3.12-slim OS/security patches automatically. A
    # Dependabot PR bumping requirements.in still gets its own build+test
    # via the push trigger above when merged.
    - cron: "17 4 * * 1"   # 04:17 UTC every Monday - arbitrary offset to
                            # avoid the top-of-hour stampede on GH runners
  workflow_dispatch:        # lets you trigger a rebuild manually too

permissions:
  contents: read
  packages: write   # needed to push to GHCR

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          # ghcr.io requires an all-lowercase image path - github.repository
          # preserves the repo's actual casing (TimePilot), which GHCR
          # rejects outright. images_tags below lowercases it explicitly.
          images: ghcr.io/${{ github.repository_owner }}/timepilot
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
