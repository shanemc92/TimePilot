<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TimePilot</title>
<link rel="icon" type="image/png" href="/static/favicon.png">
<style>
:root{
  --r:10px; --gap:12px;
}
[data-theme="dark"]{
  --bg:#121417; --surface:#1b1e23; --surface2:#23272e; --line:#2e333b;
  --text:#e7e9ec; --muted:#8b93a1; --accent:#e8a33d; --accent-text:#121417;
  --cat-general:#5b9bd5; --cat-secops:#e05d44; --cat-change:#a17ae0;
  --cal:#3d566e; --danger:#e05d44; --ok:#57b76a; --lcd-bg:#0c0e10;
}
[data-theme="light"]{
  --bg:#f4f3ef; --surface:#ffffff; --surface2:#eceae4; --line:#dcd9d0;
  --text:#25282c; --muted:#767c86; --accent:#b06f1e; --accent-text:#fff;
  --cat-general:#2f6ea5; --cat-secops:#c0392b; --cat-change:#7d4fc2;
  --cal:#8195a8; --danger:#c0392b; --ok:#2e8b47; --lcd-bg:#1c2530;
}
[data-theme="htb"]{
  --bg:#141d2b; --surface:#1a2332; --surface2:#232e42; --line:#2d3a52;
  --text:#c5d1e6; --muted:#7d8bab; --accent:#9fef00; --accent-text:#141d2b;
  --cat-general:#04d9ff; --cat-secops:#ff3e3e; --cat-change:#cf8dfb;
  --cal:#3b4d6b; --danger:#ff3e3e; --ok:#9fef00; --lcd-bg:#0d1520;
}
[data-theme="dracula"]{
  --bg:#282a36; --surface:#21222c; --surface2:#2e3040; --line:#44475a;
  --text:#f8f8f2; --muted:#6272a4; --accent:#bd93f9; --accent-text:#282a36;
  --cat-general:#8be9fd; --cat-secops:#ff5555; --cat-change:#bd93f9;
  --cal:#191a21; --danger:#ff5555; --ok:#50fa7b; --lcd-bg:#14151c;
}
[data-font="sans"]{ --ff:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; }
[data-font="mono"]{ --ff:ui-monospace,"Cascadia Code","SF Mono",Menlo,Consolas,monospace; }
[data-font="serif"]{ --ff:Georgia,"Times New Roman",serif; }

*{box-sizing:border-box;margin:0}
html,body{min-height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--ff);font-size:15px;line-height:1.45}
button{font-family:inherit;font-size:13px;border:1px solid var(--line);background:var(--surface2);
  color:var(--text);border-radius:7px;padding:5px 10px;cursor:pointer}
button:hover{border-color:var(--accent)}
button.primary{background:var(--accent);color:var(--accent-text);border-color:var(--accent);font-weight:600}
button.ghost{background:transparent}
button.danger{color:var(--danger)}
.errText{color:var(--danger)!important;font-weight:600}
input,select,textarea{font-family:inherit;font-size:14px;background:var(--surface2);color:var(--text);
  border:1px solid var(--line);border-radius:7px;padding:6px 8px}
input:focus,select:focus,textarea:focus,button:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
h1{font-size:17px;letter-spacing:.04em}
.muted{color:var(--muted)} .small{font-size:12px}

/* ---- sticky topbar: timer strip + tabs ---- */
#topbar{position:sticky;top:0;z-index:40;background:var(--bg)}
#strip{background:var(--surface);border-bottom:1px solid var(--line);
  padding:10px 14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
#strip .dot{width:10px;height:10px;border-radius:50%;background:var(--muted);flex:none}
#strip.running .dot{background:var(--ok);animation:pulse 1.6s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@media (prefers-reduced-motion:reduce){#strip.running .dot{animation:none}}
@font-face{
  font-family:'TP Digital';
  src:url('/static/digital.woff') format('woff');
  font-display:swap;
}
#elapsed.lcd{
  font-family:'TP Digital','Courier New',ui-monospace,monospace;
  font-variant-numeric:tabular-nums;
  font-size:30px;font-weight:400;letter-spacing:3px;min-width:132px;text-align:center;
  color:var(--ok);background:var(--lcd-bg);
  border:1px solid var(--line);border-radius:6px;padding:4px 14px 2px;
  box-shadow:inset 0 1px 5px rgba(0,0,0,.45);
  text-shadow:0 0 5px color-mix(in srgb, var(--ok) 60%, transparent);
}
#timerInfo{display:flex;flex-direction:column;line-height:1.15;cursor:pointer;border-radius:6px;padding:2px 6px}
#timerInfo:hover{background:var(--surface2)}
#timerInfo.idle{cursor:default}
#timerInfo.idle:hover{background:none}
#timerLabel{font-weight:600;max-width:34ch;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#timerTimes{font-variant-numeric:tabular-nums;font-family:ui-monospace,monospace;font-size:12px;color:var(--muted)}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-left:auto}
.chip{border-radius:999px;padding:4px 12px;font-size:12px}
.chip.active{background:var(--accent);color:var(--accent-text);border-color:var(--accent)}

/* ---- nav ---- */
nav{display:flex;gap:4px;padding:8px 14px;border-bottom:1px solid var(--line);align-items:center;flex-wrap:wrap;background:var(--bg)}
nav .tab{background:transparent;border:none;padding:7px 12px;border-radius:7px;color:var(--muted);font-size:14px}
nav .tab.on{background:var(--surface2);color:var(--text);font-weight:600}
nav .spacer{margin-left:auto}

main{padding:14px;max-width:1400px;margin:0 auto}

/* ---- board ---- */
#board{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:var(--gap);align-items:start}
.col{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:10px;min-height:120px}
.col.dragover{border-color:var(--accent)}
.col h2{font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:8px;
  display:flex;justify-content:space-between}
.card{background:var(--surface2);border:1px solid var(--line);border-left:3px solid var(--muted);
  border-radius:8px;padding:8px 10px;margin-bottom:8px;cursor:grab}
.card .title{font-weight:600;font-size:14px}
.card .meta{display:flex;gap:8px;align-items:center;margin-top:5px;font-size:11px;color:var(--muted);flex-wrap:wrap}
.card .meta button{padding:2px 8px;font-size:11px;flex:none}
.card .meta .metaSpacer{flex:1 1 auto;min-width:0}
.badge{padding:1px 7px;border-radius:999px;font-size:10px;text-transform:uppercase;letter-spacing:.05em;font-weight:700}
.addRow select{font-size:12px;padding:4px;max-width:78px}
.addRow{display:flex;gap:6px;margin-top:4px}
.addRow input{flex:1;min-width:0}

/* ---- today timeline ---- */
#todayWrap{display:grid;grid-template-columns:minmax(0,2fr) minmax(240px,1fr);gap:var(--gap)}
@media(max-width:820px){#todayWrap{grid-template-columns:1fr}}
#timeline{position:relative;background:var(--surface);border:1px solid var(--line);border-radius:var(--r)}
.hourRow{position:absolute;left:0;right:0;border-top:1px solid var(--line);font-size:10px;color:var(--muted);padding:2px 6px}
.block{position:absolute;left:56px;right:8px;border-radius:6px;padding:4px 8px;font-size:12px;overflow:hidden;border:1px solid rgba(0,0,0,.25)}
.block .t{font-weight:600}
.block.cal{background:var(--cal);color:#fff}
.block.lunch{background:repeating-linear-gradient(135deg,var(--surface2),var(--surface2) 8px,var(--line) 8px,var(--line) 16px);
  color:var(--muted);border:1px dashed var(--line);pointer-events:none;font-style:italic}
.block.task{font-weight:600;cursor:grab;user-select:none;touch-action:none}
.block.task:active{cursor:grabbing}

/* markdown rendering (Clipboard) */
.mdBody{font-family:var(--ff);font-size:13px;cursor:pointer}
.mdBody h2{font-size:15px;margin:6px 0 3px} .mdBody h3{font-size:14px;margin:5px 0 2px} .mdBody h4{font-size:13px;margin:4px 0 2px}
.mdBody ul,.mdBody ol{margin:4px 0 4px 20px}
.mdBody code{background:var(--surface2);border:1px solid var(--line);border-radius:4px;padding:0 4px;font-family:ui-monospace,monospace;font-size:12px}
.mdBody pre.mdCode{background:var(--surface2);border:1px solid var(--line);border-radius:6px;padding:6px 8px;margin:5px 0;font-size:12px;overflow-x:auto;font-family:ui-monospace,monospace}
.mdBody a{color:var(--accent)}
.block.now{left:0;right:0;height:0;border-top:2px solid var(--accent);z-index:5;padding:0}
.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:12px}
.panel h3{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:8px}
.slotItem{display:flex;gap:6px;align-items:center;padding:6px 0;border-bottom:1px solid var(--line);flex-wrap:wrap}
.slotItem:last-child{border-bottom:none}
.slotItem .nm{flex:1;min-width:120px;font-size:13px}
.slotItem input[type=time]{width:96px}

/* ---- notes ---- */
/* Columns cap at 4 (matching .libGrid): each track is at least 280px, but
   also at least a quarter of the row, so a 5th can never fit - independent
   of viewport or main's max-width. align-items defaults to stretch so every
   panel in a row matches the tallest one; the panel is a flex column so its
   note list absorbs the slack and "Add note..." stays pinned at the bottom. */
#notes{display:grid;grid-template-columns:repeat(auto-fill,minmax(max(280px,(100% - 3*var(--gap))/4),1fr));gap:var(--gap)}
#notes .panel{display:flex;flex-direction:column;min-width:0}
#notes .items{flex:1 1 auto}
#notes .addRow{margin-top:8px}
.noteItem{display:flex;gap:6px;align-items:flex-start;padding:6px 0;border-bottom:1px solid var(--line)}
.noteItem:last-child{border-bottom:none}
/* overflow-wrap:anywhere breaks unspaced strings (long URLs) mid-token rather
   than letting them push the panel wide; min-width:0 lets the flex child
   actually shrink below its content width, without which the break never
   engages. */
.noteItem .tx{flex:1;min-width:0;font-size:13px;white-space:pre-wrap;overflow-wrap:anywhere;cursor:pointer;border-radius:4px;padding:2px}
.noteItem .tx:hover{background:var(--surface2)}
.noteItem .tx.flash{outline:2px solid var(--ok)}
.noteItem button{flex:none}
#notes h3 .secBtns{display:flex;gap:4px;margin-left:auto}
#notes h3 .secBtns button{padding:3px 7px;font-size:11px}

/* ---- notifications ---- */
#view-notif{--accent:#e0913a}
[data-theme="light"] #view-notif{--accent:#b06a17}
#notifWrap{display:grid;grid-template-columns:minmax(0,380px) minmax(0,1fr);gap:var(--gap);align-items:start}
@media(max-width:820px){#notifWrap{grid-template-columns:1fr}}
.remItem{display:flex;gap:8px;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--line)}
.remItem:last-child{border-bottom:none}
.remItem .rMain{flex:1;min-width:0}
.remItem .rMsg{font-size:13px;overflow-wrap:anywhere;margin-bottom:3px}
.remItem .rMeta{display:flex;gap:8px;flex-wrap:wrap;font-size:11px;color:var(--muted)}
.remItem.editing{outline:1px solid var(--accent);border-radius:6px;padding:9px 6px}
.remItem .rActs{display:flex;gap:4px;flex:none}
.remItem .rActs button{padding:3px 7px;font-size:11px}
.rDue{color:var(--danger);font-weight:600}
.warnBox{background:color-mix(in srgb, var(--danger) 12%, transparent);border:1px solid var(--danger);
  border-radius:7px;padding:8px 10px;color:var(--text)}

/* tag input: emoji preview swatch + text field */
.tagInputRow{display:flex;gap:8px;align-items:center}
.tagPreview{flex:none;width:38px;height:38px;display:flex;align-items:center;justify-content:center;
  font-size:19px;background:var(--surface2);border:1px solid var(--line);border-radius:8px}
.tagInputRow input{flex:1}
.quickTagRow{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.quickTagRow button{flex:none;width:34px;height:34px;padding:0;font-size:17px;line-height:1;
  border:1px solid var(--line);background:var(--surface2);border-radius:8px;cursor:pointer;transition:.15s}
.quickTagRow button:hover{border-color:var(--accent);transform:translateY(-1px)}
.quickTagRow button.on{border-color:var(--accent);background:color-mix(in srgb, var(--accent) 14%, transparent)}
.quickTagRow .qtEmpty{font-size:12px;color:var(--muted);align-self:center}

/* recurrence toggle card, styled after the standalone ntfy scheduler this replaces */
.toggleRow{display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--surface2);
  border:1px solid var(--line);border-radius:8px;cursor:pointer;transition:border-color .15s;user-select:none}
.toggleRow:hover,.toggleRow.on{border-color:var(--accent)}
.toggleRow.on{background:color-mix(in srgb, var(--accent) 8%, var(--surface2))}
.toggleSwitch{position:relative;width:38px;height:21px;flex:none}
.toggleSwitch input{opacity:0;width:0;height:0;position:absolute}
.toggleSlider{position:absolute;inset:0;background:var(--line);border-radius:21px;transition:.15s;pointer-events:none}
.toggleSlider::before{content:"";position:absolute;width:15px;height:15px;left:3px;top:3px;
  background:var(--surface);border-radius:50%;transition:.15s;box-shadow:0 1px 2px rgba(0,0,0,.25)}
.toggleSwitch input:checked + .toggleSlider{background:var(--accent)}
.toggleSwitch input:checked + .toggleSlider::before{transform:translateX(17px)}
.recurOpts{display:none;margin-top:8px;padding:12px 14px;background:var(--surface2);
  border:1px solid var(--line);border-radius:8px}
.recurOpts.on{display:block}
.recurInputs{display:grid;grid-template-columns:76px 1fr;gap:10px;margin-top:8px}

/* ---- settings accordion ---- */
#modalBox.settings{width:min(560px,100%);display:flex;flex-direction:column;max-height:90vh;padding:0}
#modalBox.settings > h3{padding:18px 18px 12px;margin:0;flex:none}
#setBody{overflow:auto;padding:0 18px;flex:1 1 auto}
#modalBox.settings .mActions{flex:none;padding:12px 18px;border-top:1px solid var(--line);
  background:var(--surface);border-radius:0 0 12px 12px;margin:0}
.setSec{border:1px solid var(--line);border-radius:8px;margin-bottom:8px;overflow:hidden}
.setSec > summary{padding:9px 12px;cursor:pointer;font-size:13px;font-weight:600;background:var(--surface2);
  list-style:none;display:flex;align-items:center;gap:8px}
.setSec > summary::-webkit-details-marker{display:none}
.setSec > summary::before{content:"▸";color:var(--muted);font-size:11px}
.setSec[open] > summary::before{content:"▾"}
.setSec .setSecBody{padding:12px 12px 4px}
.setSec .fRow:last-child{margin-bottom:8px}

/* ---- export ---- */
#exportWrap{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:var(--gap)}
@media(max-width:1100px){#exportWrap{grid-template-columns:1fr}}
#exportWrap .panel{min-width:0;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
#exportTable{table-layout:fixed;width:100%;min-width:520px}
#exportTable th:nth-child(1),#exportTable td:nth-child(1){width:auto}
#exportTable th:nth-child(2),#exportTable td:nth-child(2){width:88px}
#exportTable th:nth-child(3),#exportTable td:nth-child(3),
#exportTable th:nth-child(4),#exportTable td:nth-child(4){width:82px}
#exportTable th:nth-child(5),#exportTable td:nth-child(5){width:58px}
#exportTable th:nth-child(6),#exportTable td:nth-child(6){width:70px}
td,th{padding:5px 6px;text-align:left;border-bottom:1px solid var(--line);vertical-align:middle}
td input{width:100%;padding:3px 6px;font-size:13px}
#entryRows td:nth-child(2){max-width:0}
#entryRows select{width:100%;min-width:70px;font-size:12px}
td input[type=time]{width:74px;padding:3px 2px;font-size:12px}
td input[type=number]{width:46px}
.labCell{display:flex;align-items:center;gap:5px;white-space:nowrap}
.labCell input{flex:1;min-width:50px;width:auto}
.rowActs{white-space:nowrap}
.rowActs .actWrap{display:inline-flex;gap:4px;align-items:center;vertical-align:middle}
.rowActs button{padding:3px 7px;line-height:1.4}
tr.rowDirty td{background:color-mix(in srgb, var(--accent) 10%, transparent)}
pre#exportText{background:var(--surface2);border:1px solid var(--line);border-radius:8px;padding:12px;
  white-space:pre-wrap;font-size:13px;font-family:ui-monospace,monospace;min-height:140px}

/* ---- snippets / clipboard libraries ---- */
#view-snips{--accent:#bd93f9}
[data-theme="light"] #view-snips{--accent:#8b5fd0}
/* Same 4-column cap formula as #notes - previously this only ever showed 4
   because main's max-width happened to stop a 5th fitting; now it's explicit. */
.libGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(max(280px,(100% - 3*var(--gap))/4),1fr));gap:var(--gap);align-items:start}
.libCard .hd{margin-bottom:2px}
.libCard .hd strong{font-size:14px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.libCard .hd2{display:flex;gap:5px;align-items:center;flex-wrap:nowrap;margin-bottom:4px;min-height:26px}
.libCard .hd2 button{padding:3px 8px;font-size:11px;flex:none}
.libCard .desc{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-height:1.3em}
.tagB{border:1px solid var(--accent);color:var(--accent);border-radius:999px;padding:1px 8px;font-size:10px;letter-spacing:.04em;flex:none}
.libBody{background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:8px;margin-top:6px;
  font-size:12px;line-height:1.5;height:calc(4 * 1.5em + 16px);overflow:auto;white-space:pre-wrap;word-break:break-word;
  cursor:pointer;font-family:ui-monospace,"Cascadia Code",Menlo,Consolas,monospace}
.libBody.flash{outline:2px solid var(--ok)}
.libBody.mdBody{white-space:normal;font-family:var(--ff);font-size:13px}
.libBar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.libChips{display:flex;gap:6px;flex-wrap:wrap;flex:1 1 auto;min-width:0}
.libBar > [data-search]{flex:0 1 200px;min-width:120px;margin-left:auto}
.libBar .chip{max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ---- modal ---- */
#modal{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:60;padding:14px}
#modal.open{display:flex}
#modalBox{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:18px;width:min(460px,100%);
  max-height:90vh;overflow:auto}
#modalBox h3{margin-bottom:12px}
.fRow{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.fRow label{font-size:12px;color:var(--muted)}
.mActions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.notice{background:var(--surface2);border:1px solid var(--line);border-radius:8px;padding:8px 12px;font-size:13px;color:var(--muted);margin-bottom:10px}
#saveDot{width:8px;height:8px;border-radius:50%;background:var(--ok);display:inline-block;margin-left:6px;transition:background .3s}
#saveDot.dirty{background:var(--accent)}
</style>
</head>
<body data-theme="dark" data-font="sans">

<div id="topbar">
<div id="strip">
  <span class="dot"></span>
  <span id="elapsed" class="lcd">00:00</span>
  <div id="timerInfo" title="Click to edit current task">
    <span id="timerLabel" class="muted">No timer running</span>
    <span id="timerTimes"></span>
  </div>
  <button id="stopBtn" style="display:none">■ Stop</button>
  <div class="chips" id="interruptChips"></div>
</div>

<nav>
  <h1>TimePilot<span id="saveDot" title="save state"></span></h1>
  <button class="tab" data-view="board">Board</button>
  <button class="tab" data-view="today">Today</button>
  <button class="tab" data-view="notes">Notes</button>
  <button class="tab" data-view="snips">Snippets</button>
  <button class="tab" data-view="paste">Clipboard</button>
  <button class="tab" data-view="notif">Notifications</button>
  <button class="tab" data-view="export">Export</button>
  <span class="spacer"></span>
  <button id="settingsBtn" class="ghost">⚙ Settings</button>
  <button id="logoutBtn" class="ghost" title="Log out">⎋</button>
</nav>
</div>

<main>
  <section id="view-board" style="display:none"><div id="board"></div></section>

  <section id="view-today" style="display:none">
    <div class="notice" id="calNotice" style="display:none"></div>
    <div id="todayWrap">
      <div id="timeline"></div>
      <div>
        <div class="panel" style="margin-bottom:12px">
          <h3 style="display:flex;align-items:center"><span>Unslotted today</span><button id="calRefresh" class="ghost small" style="margin-left:auto">↻ refresh cal</button></h3>
          <div id="unslotted"></div>
        </div>
        <div class="panel">
          <h3>Slotted</h3>
          <div id="slotted"></div>
        </div>
      </div>
    </div>
  </section>

  <section id="view-notes" style="display:none">
    <div style="margin-bottom:10px;display:flex;gap:6px">
      <input id="newSection" placeholder="New section name..." style="max-width:240px">
      <button id="addSection">Add section</button>
    </div>
    <div id="notes"></div>
  </section>

  <section id="view-snips" style="display:none"></section>
  <section id="view-paste" style="display:none"></section>

  <section id="view-notif" style="display:none">
    <div id="notifWrap">
      <div class="panel">
        <h3 id="remFormTitle">New reminder</h3>
        <div id="remWarn" class="small" style="display:none;margin-bottom:10px"></div>
        <div class="fRow"><label>Message</label>
          <textarea id="remMsg" rows="3" maxlength="500" placeholder="What should the notification say?"></textarea></div>
        <div class="fRow"><label>When</label>

<div id="modal"><div id="modalBox"></div></div>

<script>
"use strict";
/* ================= state ================= */
let S = null;               // server state
let dirty = false, saveT = null;
const $ = s => document.querySelector(s);
const uid = () => Math.random().toString(36).slice(2, 10);
const THEMES = [["dark","Dark"],["light","Light"],["htb","HackTheBox"],["dracula","Dracula"]];
const FONTS = [["sans","Sans"],["mono","Mono"],["serif","Serif"]];
const todayISO = () => new Date().toISOString().slice(0, 10);
const COLS = [["today","Today"],["week","This Week"],["nextweek","Next Week"],["nextmonth","Next Month"],["done","Done"]];
const DEF_CATS = [{k:"general",label:"General",color:"#5b9bd5"},{k:"meetings",label:"Meetings",color:"#57b76a"},{k:"admin",label:"Admin",color:"#a17ae0"}];
const getCats = () => (S.settings.categories && S.settings.categories.length) ? S.settings.categories : DEF_CATS;
const allCats = () => [...getCats(), {k:"meeting",label:"Meeting",color:null}];
const catOf = k => allCats().find(c=>c.k===k);
const catName = k => (catOf(k)||{label:"?"}).label;
const defCat = () => getCats()[0].k;
const catColorRaw = k => k==="meeting"
  ? (getComputedStyle(document.body).getPropertyValue("--cal").trim() || "#3d566e")
  : ((catOf(k)||{}).color || "#888888");
const catColor = k => safeColor(catColorRaw(k));
const txtOn = hex => { const n = parseInt(hex.replace("#",""),16);
  return (0.299*(n>>16&255)+0.587*(n>>8&255)+0.114*(n&255)) > 150 ? "#141414" : "#ffffff"; };
const badgeHtml = k => { const c = catColor(k);
  return `<span class="badge" style="background:${c};color:${txtOn(c)}">${esc(catName(k))}</span>`; };
const entCat = e => e.category || (e.source==="cal" ? "meeting"
  : ((S.tasks.find(x=>x.id===e.taskId)||{}).category || defCat()));
let view = "board", calCache = {};

async function loadState(){
  const r = await fetch("/api/state");
  if(r.status === 401 || r.redirected){ location.href = "/login"; return; }
  S = await r.json(); dailyCleanup(); applySettings(); renderAll();
  // Warm today's calendar in the background rather than waiting for
  // whichever tab happens to trigger the first fetch of the day (often
  // Export). The server caches raw ICS bytes for 5 minutes (CACHE_TTL in
  // app.py) but still re-parses/re-expands recurring events on every call,
  // so a cold cache means a real network round-trip to the ICS URL - that
  // wait just gets moved here, off the critical path, instead of landing
  // on whichever click triggers it. importCalToLog also materializes
  // today's meetings into S.timelog, so a later renderExport()'s own
  // (idempotent, dedup'd via S.calSeen) call finds nothing new to import.
  // Deliberately not awaited - initial render above shouldn't wait on it,
  // and a failure here (no calendar configured, fetch error) is silently
  // fine since every real call site already handles that itself.
  importCalToLog(todayISO()).catch(()=>{});
}
function markDirty(){
  dirty = true; $("#saveDot").classList.add("dirty");
  clearTimeout(saveT); saveT = setTimeout(persist, 600);
}
let _persistPromise = null;
async function persist(){
  while(_persistPromise) await _persistPromise;   // don't overlap writes - wait for one already in flight first
  const snapshot = JSON.stringify(S);
  _persistPromise = (async () => {
    try {
      const r = await fetch("/api/state",{method:"PUT",headers:{"Content-Type":"application/json"},body:snapshot});
      if(!r.ok) throw new Error("save failed "+r.status);
      // only clear the flag if nothing changed while this write was in flight
      if(JSON.stringify(S) === snapshot){ dirty = false; $("#saveDot").classList.remove("dirty"); }
    } catch(e){
      // leave dirty set so a later markDirty/persist retries; surface nothing intrusive
    } finally {
      _persistPromise = null;
    }
  })();
  return _persistPromise;
}
function persistBeacon(){
  try { navigator.sendBeacon("/api/state", new Blob([JSON.stringify(S)], {type:"application/json"})); }
  catch(e){}
}

/* ================= helpers ================= */
const pad = n => String(n).padStart(2,"0");
const hmNow = () => { const d=new Date(); return pad(d.getHours())+":"+pad(d.getMinutes()); };
// Local-date YYYY-MM-DD. Deliberately not todayISO()'s toISOString(), which
// is UTC - that shifts the date near midnight and would put a reminder's
// date picker on the wrong day.
const isoOf = d => d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());
const hmToMin = hm => { const [h,m]=hm.split(":").map(Number); return h*60+m; };
const minToHM = m => pad(Math.floor(m/60))+":"+pad(m%60);
const fmtDur = m => { m=Math.max(0,Math.round(m)); const h=Math.floor(m/60); return (h? h+"h ":"")+(m%60)+"m"; };
const esc = s => s.replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const ascii = s => String(s).replace(/[\u2010-\u2015\u2212]/g,"-").replace(/\u2026/g,"...");
// only allow #hex / rgb() / named colours into style attributes (defence-in-depth vs hand-edited category JSON)
const safeColor = c => (typeof c === "string" && /^(#[0-9a-fA-F]{3,8}|rgb\([\d,\s.]+\)|rgba\([\d,\s.%]+\)|[a-zA-Z]+)$/.test(c.trim())) ? c.trim() : "#888888";

/* ================= settings/theme ================= */
function applySettings(){
  const validThemes = THEMES.map(t=>t[0]), validFonts = FONTS.map(f=>f[0]);
  if(!validThemes.includes(S.settings.theme)) S.settings.theme = "dark";
  if(!validFonts.includes(S.settings.font)) S.settings.font = "sans";
  document.body.dataset.theme = S.settings.theme;
  document.body.dataset.font = S.settings.font;
}

/* ================= timer ================= */
function startTimer(label, taskId, category){
  stopTimer();
  S.activeTimer = { label, taskId: taskId || null, category: category || null, start: new Date().toISOString() };
  markDirty(); renderStrip();
}
function stopTimer(){
  if(!S.activeTimer) return;
  const t = S.activeTimer, start = new Date(t.start), end = new Date();
  const mins = Math.max(1, Math.round((end - start)/60000));
  const cat = t.category || ((S.tasks.find(x=>x.id===t.taskId)||{}).category) || defCat();
  S.timelog.push({ id:uid(), date: start.toISOString().slice(0,10), label:t.label, taskId:t.taskId, category:cat,
    start: pad(start.getHours())+":"+pad(start.getMinutes()), end: hmNow(), minutes: mins });
  S.activeTimer = null;
  markDirty(); renderStrip(); if(view==="export") renderExport();
}
function renderStrip(){
  const strip = $("#strip"), t = S.activeTimer;
  strip.classList.toggle("running", !!t);
  $("#stopBtn").style.display = t ? "" : "none";
  $("#timerLabel").textContent = t ? t.label : "No timer running";
  $("#timerLabel").classList.toggle("muted", !t);
  $("#timerInfo").classList.toggle("idle", !t);
  const chips = $("#interruptChips"); chips.innerHTML = "";
  (S.settings.interrupts||[]).forEach(name=>{
    const b = document.createElement("button");
    b.className = "chip" + (t && t.label.startsWith(name) ? " active":"");
    b.textContent = name;
    b.onclick = () => interruptModal(name);
    chips.appendChild(b);
  });
  tick();
}
// Today's timelog entry with the latest end time - i.e. whatever was logged
// immediately before "now". That's the entry a backdated timer start should
// extend to meet, since it's the thing that left the gap in the first place.
function lastTimelogEntryToday(){
  const day = todayISO();
  // Calendar meetings get auto-imported into the timelog with their real
  // scheduled end time (see importCalToLog), which can be later today - a
  // meeting at 15:00 has a numerically bigger end than a task that just
  // finished at 11:00, but it hasn't happened yet. Only entries that have
  // actually ended by now are eligible to be "the last thing," or a future
  // meeting would win purely on clock arithmetic.
  const nowMin = hmToMin(hmNow());
  let best = null, bestMin = -1;
  S.timelog.forEach(e => {
    if(e.date !== day) return;
    const m = hmToMin(e.end);
    if(m > nowMin) return;
    if(m > bestMin){ best = e; bestMin = m; }
  });
  return best;
}
async function editTimerModal(){
  const t = S.activeTimer; if(!t) return;
  const st = new Date(t.start);
  const curCat = t.category || ((S.tasks.find(x=>x.id===t.taskId)||{}).category) || defCat();
  openModal(`<h3>Edit current task</h3>
    <div class="fRow"><label>Task name</label><input id="etName" value="${esc(t.label)}"></div>
    <div class="fRow"><label>Category</label><select id="etCat">${allCats().map(c=>`<option value="${c.k}"${curCat===c.k?" selected":""}>${esc(c.label)}</option>`).join("")}</select></div>
    <div class="fRow"><label>Start time (now: running ${fmtDur((Date.now()-st)/60000)})</label><input id="etStart" type="time" value="${pad(st.getHours())}:${pad(st.getMinutes())}">
      <div id="etSyncNote" class="small muted" style="margin-top:4px">Checking today's log…</div>
      <label id="etSyncRow" class="small" style="display:none;margin-top:6px">
        <input type="checkbox" id="etSyncConfirm" checked> <span id="etSyncLabel">Also adjust that entry as shown above</span></label></div>
    <div class="mActions"><button class="danger" id="etDiscard">Discard timer</button><button id="mCancel">Cancel</button><button class="primary" id="etSave">Save</button></div>`);
  const oldStartHM = pad(st.getHours())+":"+pad(st.getMinutes());
  setTimeout(()=>$("#etName").focus(), 50);
  $("#etDiscard").onclick = () => {
    if(!confirm("Discard the running timer without logging it?")) return;
    S.activeTimer = null; markDirty(); closeModal(); renderStrip();
  };
  $("#mCancel").onclick = closeModal;

  // Meetings only land in S.timelog when the Export tab has imported them
  // (importCalToLog) - if today's calendar hasn't been opened yet, a
  // meeting sitting between the stopped task and now simply isn't in
  // S.timelog, so the sync used to reach straight past it to whatever
  // OLDER task happened to be there. Importing here first (same path, same
  // ignore-list, same dedup against deleted entries via S.calSeen the
  // Export tab uses) means the check always sees the real last thing that
  // happened, not just whatever the app happened to already know about.
  // Deliberately not skipped if the modal gets closed before this
  // resolves - it's a harmless, idempotent sync either way.
  try { await importCalToLog(todayISO()); } catch(e){ /* no calendar configured, or fetch failed - fine, just means nothing to add */ }
  if(!$("#etSyncNote")) return;   // modal was closed/replaced while we were awaiting

  // Live preview of the previous-entry sync, recomputed on every keystroke -
  // and, now, backed by a checkbox defaulted ON rather than applying
  // silently. You see exactly what's about to change and can uncheck it for
  // this one correction if it picked the wrong thing (e.g. you were in an
  // unlogged meeting the app doesn't know the boundaries of).
  const updateSyncNote = () => {
    const note = $("#etSyncNote"), row = $("#etSyncRow"), val = $("#etStart").value;
    row.style.display = "none";
    if(!val || val === oldStartHM){ note.textContent = ""; return; }
    if(S.settings.syncLastTaskEnd === false){
      note.textContent = "Previous-entry syncing is off (Settings → Categories & timers).";
      note.className = "small muted"; return;
    }
    const last = lastTimelogEntryToday();
    if(!last){ note.textContent = "No earlier entry logged today to adjust."; note.className = "small muted"; return; }
    if(last.end === val){ note.textContent = `Already matches "${last.label}" - nothing to adjust.`; note.className = "small muted"; return; }
    const mins = hmToMin(val) - hmToMin(last.start);
    if(mins < 1){
      note.textContent = `Won't adjust "${last.label}" - that start is before it began (${last.start}).`;
      note.className = "small errText";
    } else {
      note.textContent = `Last logged: "${last.label}" (${last.source==="cal"?"meeting":"task"}, ${last.start}–${last.end}).`;
      note.className = "small muted";
      row.style.display = "";
      $("#etSyncLabel").textContent = `Also move its end to ${val} to match`;
    }
  };
  $("#etStart").addEventListener("input", updateSyncNote);
  updateSyncNote();

  $("#etSave").onclick = () => {
    const name = $("#etName").value.trim(); if(!name){ alert("Task name required."); return; }
    t.label = name; t.category = $("#etCat").value;
    const [h,m] = $("#etStart").value.split(":").map(Number);
    const ns = new Date(st); ns.setHours(h, m, 0, 0);
    if(ns > new Date()){ alert("Start time can't be in the future."); return; }
    const newStartHM = pad(h)+":"+pad(m);
    if(S.settings.syncLastTaskEnd !== false && newStartHM !== oldStartHM
       && $("#etSyncRow").style.display !== "none" && $("#etSyncConfirm").checked){
      const last = lastTimelogEntryToday();
      if(last && last.end !== newStartHM){
        const mins = hmToMin(newStartHM) - hmToMin(last.start);
        // Only pull the boundary - never push it past the previous entry's
        // OWN start (that would invert or zero out its duration). If the new
        // start lands earlier than that, leave the previous entry alone
        // rather than silently corrupting its logged time. (The note above
        // and the now-hidden checkbox already reflect this.)
        if(mins >= 1){ last.end = newStartHM; last.minutes = mins; }
      }
    }
    t.start = ns.toISOString();
    markDirty(); closeModal(); renderStrip(); if(view==="export") renderExport();
  };
}
$("#timerInfo").onclick = () => { if(S.activeTimer) editTimerModal(); };
function interruptModal(name){
  openModal(`<h3>${esc(name)}</h3>
    <div class="fRow"><label>Detail (optional - ticket #, who, what...)</label><input id="mDetail" maxlength="80"></div>
    <div class="mActions"><button id="mCancel">Cancel</button><button class="primary" id="mGo">▶ Start</button></div>`);
  const go = () => { const d = $("#mDetail").value.trim();
    startTimer(d ? `${name} - ${d}` : name); closeModal(); };
  $("#mGo").onclick = go;
  $("#mCancel").onclick = closeModal;
  $("#mDetail").onkeydown = e => { if(e.key==="Enter") go(); if(e.key==="Escape") closeModal(); };
  setTimeout(()=>$("#mDetail").focus(), 50);
}
let _tickDay = todayISO();
function tick(){
  const d = todayISO();
  if(S && d !== _tickDay){ _tickDay = d; dailyCleanup(); if(view==="board") renderBoard(); }
  const t = S && S.activeTimer;
  if(!t){ $("#elapsed").textContent = "00:00"; $("#timerTimes").textContent = ""; return; }
  const st = new Date(t.start);
  $("#timerTimes").textContent = pad(st.getHours())+":"+pad(st.getMinutes())+" - "+hmNow();
  const s = Math.floor((Date.now() - st)/1000);
  $("#elapsed").textContent = s>=3600
    ? pad(Math.floor(s/3600))+":"+pad(Math.floor(s%3600/60))+":"+pad(s%60)
    : pad(Math.floor(s/60))+":"+pad(s%60);
}
setInterval(tick, 1000);
$("#stopBtn").onclick = stopTimer;

/* ================= board ================= */
function renderBoard(){
  const board = $("#board"); board.innerHTML = "";
  COLS.forEach(([key,label])=>{
    const col = document.createElement("div"); col.className = "col"; col.dataset.col = key;
    const tasks = S.tasks.filter(t=>t.column===key);
    col.innerHTML = `<h2>${label}<span><button class="ghost small" title="Add task with full details" style="padding:1px 8px;margin-right:6px">＋</button><span class="muted">${tasks.length}</span></span></h2>`;
    col.querySelector("h2 button").onclick = () => taskModal(null, key);
    tasks.forEach(t => col.appendChild(cardEl(t)));
    col.ondragover = e => { e.preventDefault(); col.classList.add("dragover"); };
    col.ondragleave = () => col.classList.remove("dragover");
    col.ondrop = e => { e.preventDefault(); col.classList.remove("dragover");
      const t = S.tasks.find(x=>x.id===e.dataTransfer.getData("id"));
      if(t){ t.column = key; if(key!=="today") t.slot=null;
        t.doneAt = key==="done" ? todayISO() : null;
        markDirty(); renderBoard(); } };
    board.appendChild(col);
  });
}
function dailyCleanup(){
  const today = todayISO();
  S.tasks.forEach(t=>{ if(t.column==="done" && !t.doneAt) t.doneAt = today; });
  const n = S.tasks.length;
  S.tasks = S.tasks.filter(t => !(t.column==="done" && t.doneAt < today));
  if(S.tasks.length !== n) markDirty();
}
function cardEl(t){
  const el = document.createElement("div");
  el.className = "card"; el.draggable = true;
  el.style.borderLeftColor = catColor(t.category);
  el.innerHTML = `<div class="title">${esc(t.title)}</div>
    <div class="meta">${badgeHtml(t.category)}
    <span>${t.est||30}m</span>${t.slot?`<span>@${t.slot}</span>`:""}
    <span class="metaSpacer"></span>
    <button title="Start timer">▶</button><button title="Edit">✎</button></div>`;
  el.ondragstart = e => e.dataTransfer.setData("id", t.id);
  const [play, edit] = el.querySelectorAll("button");
  play.onclick = () => startTimer(t.title, t.id);
  edit.onclick = () => taskModal(t);
  return el;
}
function taskModal(t, col){
  const isNew = !t;
  if(isNew) t = { title:"", category:defCat(), column:col||"today", est:30, slot:null };
  openModal(`<h3>${isNew?"New task":"Edit task"}</h3>
    <div class="fRow"><label>Title</label><input id="mTitle" value="${esc(t.title)}"></div>
    <div class="fRow"><label>Category</label><select id="mCat">${getCats().map(c=>`<option value="${c.k}"${t.category===c.k?" selected":""}>${esc(c.label)}</option>`).join("")}</select></div>
    <div class="fRow"><label>Column</label><select id="mCol">${COLS.map(([k,l])=>`<option value="${k}"${t.column===k?" selected":""}>${l}</option>`).join("")}</select></div>
    <div class="fRow"><label>Estimate (minutes)</label><input id="mEst" type="number" min="5" step="5" value="${t.est||30}"></div>
    <div class="mActions">${isNew?"":'<button class="danger" id="mDel">Delete</button>'}<button id="mCancel">Cancel</button><button class="primary" id="mSave">${isNew?"Add":"Save"}</button></div>`);
  const save = () => {
    const title = $("#mTitle").value.trim();
    if(!title){ alert("Title is required."); return; }
    t.title = title; t.category = $("#mCat").value;
    t.column = $("#mCol").value; t.est = +$("#mEst").value || 30;
    if(t.column !== "today") t.slot = null;
    t.doneAt = t.column==="done" ? (t.doneAt || todayISO()) : null;
    if(isNew) S.tasks.push({id:uid(), ...t});
    markDirty(); closeModal(); renderBoard(); if(view==="today") renderToday();
  };
  $("#mSave").onclick = save;
  $("#mTitle").onkeydown = e => { if(e.key==="Enter") save(); };
  if(!isNew) $("#mDel").onclick = () => { S.tasks = S.tasks.filter(x=>x.id!==t.id); markDirty(); closeModal(); renderBoard(); if(view==="today") renderToday(); };
  $("#mCancel").onclick = closeModal;
  if(isNew) setTimeout(()=>$("#mTitle").focus(), 50);
}

/* ================= today ================= */
async function fetchCal(d, force){
  if(!force && calCache[d]) return calCache[d];
  const r = await fetch(`/api/calendar?date=${d}${force?"&refresh=1":""}`);
  const j = await r.json();
  if(j.error) return calCache[d] = {events:[], error:j.error};
  return calCache[d] = j;
}
async function renderToday(force){
  const cal = await fetchCal(todayISO(), force);
  const note = cal.error ? "Calendar: "+cal.error : (cal.warn ? "Calendar: "+cal.warn : "");
  $("#calNotice").style.display = note ? "" : "none";
  if(note) $("#calNotice").textContent = note;
  // Work hours bound auto-slotting; the display range is what the timeline actually
  // shows/allows dragging into - separate on purpose, so occasional out-of-hours work
  // can be seen and manually placed without "Auto" starting to treat odd hours as normal.
  const workStartM = hmToMin(S.settings.dayStart||"08:00"), workEndM = hmToMin(S.settings.dayEnd||"18:00");
  const viewStartM = hmToMin(S.settings.viewStart || S.settings.dayStart || "08:00");
  const viewEndM = hmToMin(S.settings.viewEnd || S.settings.dayEnd || "18:00");
  const tl = $("#timeline");
  // scale the day to fill the window below the timeline's top edge (min 0.7 px/min, then it scrolls)
  const avail = window.innerHeight - tl.getBoundingClientRect().top - 18;
  const pxPerMin = Math.max(0.7, avail / (viewEndM - viewStartM));
  tl.style.height = (viewEndM-viewStartM)*pxPerMin + "px"; tl.innerHTML = "";
  for(let h=Math.ceil(viewStartM/60); h*60<viewEndM; h++){
    const row = document.createElement("div"); row.className="hourRow";
    row.style.top = (h*60-viewStartM)*pxPerMin+"px"; row.textContent = pad(h)+":00";
    tl.appendChild(row);
  }
  const GUTTER = 56, MARGIN = 8;
  const put = (topM, durM, cls, html, onclick, bg, colInfo) => {
    const b = document.createElement("div"); b.className = "block "+cls;
    b.style.top = (topM-viewStartM)*pxPerMin+"px";
    b.style.height = Math.max(16, durM*pxPerMin-2)+"px";
    if(colInfo && colInfo.totalCols > 1){
      // side-by-side layout for overlapping items, like Outlook/Google Calendar -
      // split the available width evenly across however many columns this cluster needs
      const availW = tl.clientWidth - GUTTER - MARGIN;
      const colW = availW / colInfo.totalCols;
      b.style.left = (GUTTER + colInfo.col*colW) + "px";
      b.style.width = Math.max(24, colW - 3) + "px";
      b.style.right = "auto";
    }
    if(bg){ b.style.background = bg; b.style.color = txtOn(bg); }
    b.innerHTML = html; if(onclick) b.onclick = onclick;
    tl.appendChild(b); return b;
  };
  // Clusters transitively-overlapping items and greedily assigns each a column
  // (first column whose previous occupant has already ended), then records how
  // many columns its whole cluster needed - the same layout every day-view
  // calendar uses so overlapping items sit side by side instead of hiding
  // each other. Only meetings + slotted tasks participate; lunch and the
  // "now" line are background/foreground indicators, not competing content.
  function layoutOverlaps(items){
    items.sort((a,b)=>a.startM-b.startM);
    let cluster = [], clusterEnd = -Infinity;
    const clusters = [];
    for(const it of items){
      if(cluster.length && it.startM >= clusterEnd){ clusters.push(cluster); cluster = []; clusterEnd = -Infinity; }
      cluster.push(it); clusterEnd = Math.max(clusterEnd, it.endM);
    }
    if(cluster.length) clusters.push(cluster);
    for(const cl of clusters){
      const colEnds = [];   // colEnds[i] = end time of the last item placed in column i
      for(const it of cl){
        let placed = false;
        for(let i=0;i<colEnds.length;i++){
          if(colEnds[i] <= it.startM){ it.col = i; colEnds[i] = it.endM; placed = true; break; }
        }
        if(!placed){ it.col = colEnds.length; colEnds.push(it.endM); }
      }
      for(const it of cl) it.totalCols = colEnds.length;
    }
    return items;
  }
  // lunch block - shown if it overlaps the visible range at all, excluded from auto-slot below
  const lunchStartM = S.settings.lunchStart ? hmToMin(S.settings.lunchStart) : null;
  const lunchEndM = S.settings.lunchEnd ? hmToMin(S.settings.lunchEnd) : null;
  const hasLunch = lunchStartM!=null && lunchEndM!=null && lunchEndM > lunchStartM;
  if(hasLunch && lunchEndM > viewStartM && lunchStartM < viewEndM){
    put(Math.max(lunchStartM,viewStartM), Math.min(lunchEndM,viewEndM)-Math.max(lunchStartM,viewStartM),
      "lunch", `<span class="t">Lunch</span>`);
  }
  const ignoreEv = (S.settings.ignoreEvents || ["Private Appointment"]).map(x=>x.toLowerCase().trim()).filter(Boolean);
  const timedEvents = cal.events.filter(e=>!e.allDay && !ignoreEv.includes((e.title||"").toLowerCase().trim()));
  const todayTasks = S.tasks.filter(t=>t.column==="today");
  const slottedTasks = todayTasks.filter(t=>t.slot);

  // one shared layout pass across meetings + tasks, so an overlap between the
  // two (not just within one type) still splits side by side correctly
  const layoutItems = [
    ...timedEvents.map(e=>{ const s=new Date(e.start), en=new Date(e.end);
      return { kind:"cal", startM:s.getHours()*60+s.getMinutes(), endM:en.getHours()*60+en.getMinutes(), data:e }; }),
    ...slottedTasks.map(t=>({ kind:"task", startM:hmToMin(t.slot), endM:hmToMin(t.slot)+(t.est||30), data:t })),
  ];
  layoutOverlaps(layoutItems);
  const colOf = it => ({ col: it.col, totalCols: it.totalCols });

  layoutItems.filter(it=>it.kind==="cal").forEach(it=>{
    const e = it.data;
    put(it.startM, it.endM-it.startM, "cal",
      `<span class="t">${esc(e.title)}</span>${e.location?` <span class="small">· ${esc(e.location)}</span>`:""}`,
      null, null, colOf(it));
  });
  layoutItems.filter(it=>it.kind==="task").forEach(it=>{
    const t = it.data;
    const c = catColor(t.category);
    const b = put(it.startM, t.est||30, "task", `<span class="t">${esc(t.title)}</span>`, null, c, colOf(it));
    b.title = "Drag to move, click to edit";
    b.addEventListener("pointerdown", e => {
      if(e.button !== 0) return;
      e.preventDefault(); b.setPointerCapture(e.pointerId);
      const sy = e.clientY, origTop = parseFloat(b.style.top), blkH = b.offsetHeight;
      let moved = false;
      const mv = ev => {
        const dy = ev.clientY - sy;
        if(Math.abs(dy) > 3) moved = true;
        if(moved){
          b.style.top = Math.min((viewEndM-viewStartM)*pxPerMin - blkH, Math.max(0, origTop + dy)) + "px";
          b.style.zIndex = 10;
        }
      };
      const up = () => {
        b.removeEventListener("pointermove", mv);
        b.removeEventListener("pointerup", up); b.removeEventListener("pointercancel", up);
        if(!moved){ taskModal(t); return; }
        let m = viewStartM + parseFloat(b.style.top) / pxPerMin;
        m = Math.round(m / 5) * 5;                                       // snap to 5 min
        m = Math.min(viewEndM - (t.est||30), Math.max(viewStartM, m));   // stay inside the visible range
        t.slot = minToHM(m); markDirty(); renderToday();
      };
      b.addEventListener("pointermove", mv);
      b.addEventListener("pointerup", up);
      b.addEventListener("pointercancel", up);
    });
  });
  const nowM = hmToMin(hmNow());
  if(nowM>=viewStartM && nowM<=viewEndM) put(nowM, 0, "now", "");

  // free-gap finder for auto-slot - respects WORK HOURS (not the wider display range) and skips lunch
  const busy = timedEvents.map(e=>{const s=new Date(e.start),en=new Date(e.end);
    return [s.getHours()*60+s.getMinutes(), en.getHours()*60+en.getMinutes()];})
    .concat(todayTasks.filter(t=>t.slot).map(t=>[hmToMin(t.slot), hmToMin(t.slot)+(t.est||30)]))
    .concat(hasLunch ? [[lunchStartM, lunchEndM]] : [])
    .sort((a,b)=>a[0]-b[0]);
  const firstGap = need => {
    let cur = Math.max(workStartM, nowM);
    for(const [s,e] of busy){ if(s - cur >= need) break; cur = Math.max(cur, e); }
    return cur + need <= workEndM ? cur : null;
  };

  const un = $("#unslotted"), sl = $("#slotted"); un.innerHTML=""; sl.innerHTML="";
  todayTasks.forEach(t=>{
    const row = document.createElement("div"); row.className="slotItem";
    if(!t.slot){
      row.innerHTML = `<span class="badge" style="background:${catColor(t.category)}">&nbsp;</span><span class="nm">${esc(t.title)} <span class="muted small">(${t.est||30}m)</span></span>
        <input type="time"><button>Slot</button><button class="ghost">Auto</button>`;
      const [inp] = row.querySelectorAll("input"), [btn, auto] = row.querySelectorAll("button");
      btn.onclick = () => { if(inp.value){ t.slot = inp.value; markDirty(); renderToday(); } };
      auto.onclick = () => { const g = firstGap(t.est||30);
        if(g==null){ alert("No free gap fits within work hours today."); return; }
        t.slot = minToHM(g); markDirty(); renderToday(); };
      un.appendChild(row);
    } else {
      row.innerHTML = `<span class="badge" style="background:${catColor(t.category)}">&nbsp;</span><span class="nm">${esc(t.title)}</span>
        <span class="small muted">@${t.slot}</span><button title="Start timer">▶</button><button class="ghost">Unslot</button>`;
      const [play, unbtn] = row.querySelectorAll("button");
      play.onclick = () => startTimer(t.title, t.id);
      unbtn.onclick = () => { t.slot=null; markDirty(); renderToday(); };
      sl.appendChild(row);
    }
  });
  if(!todayTasks.length) un.innerHTML = `<span class="muted small">No tasks in Today column.</span>`;
}

/* ================= snippet / clipboard libraries ================= */
const LIBS = { snips:{key:"snippets", label:"snippet", ph:"# code..."},
               paste:{key:"pastes", label:"paste block", ph:"Markdown supported: **bold**, `code`, ``` blocks, - lists, [links](https://...)", md:true} };
const libFilter = {snips:"", paste:""}, libSearch = {snips:"", paste:""};

function moveLibItem(kind, id, dir){
  const arr = S[LIBS[kind].key];
  const i = arr.findIndex(x=>x.id===id), j = i + dir;
  if(i<0 || j<0 || j>=arr.length) return;
  [arr[i], arr[j]] = [arr[j], arr[i]];
  markDirty(); renderLibGrid(kind);

function mdRender(src){
  const fences = [];
  let s = src.replace(/```(?:\w*\n)?([\s\S]*?)```/g, (m,c)=>{
    fences.push(c.replace(/\n$/,"")); return "\u0000"+(fences.length-1)+"\u0000"; });
  s = esc(s);
  s = s.replace(/^### (.*)$/gm,"<h4>$1</h4>")
       .replace(/^## (.*)$/gm,"<h3>$1</h3>")
       .replace(/^# (.*)$/gm,"<h2>$1</h2>");
  s = s.replace(/`([^`\n]+)`/g,"<code>$1</code>");
  s = s.replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>")
       .replace(/(^|[\s(])\*([^*\n]+)\*/g,"$1<em>$2</em>");
  s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  s = s.replace(/(?:^|\n)((?:[-*] .*(?:\n|$))+)/g, m =>
    "\n<ul>"+m.trim().split(/\n/).map(l=>"<li>"+l.replace(/^[-*] /,"")+"</li>").join("")+"</ul>");
  s = s.replace(/(?:^|\n)((?:\d+\. .*(?:\n|$))+)/g, m =>
    "\n<ol>"+m.trim().split(/\n/).map(l=>"<li>"+l.replace(/^\d+\. /,"")+"</li>").join("")+"</ol>");
  s = s.replace(/\n{2,}/g,"<br><br>").replace(/\n/g,"<br>");
  s = s.replace(/<br>(?=<(?:h\d|ul|ol))/g,"").replace(/(<\/(?:h\d|ul|ol)>)<br>/g,"$1");
  s = s.replace(/\u0000(\d+)\u0000/g,(m,i)=>`<pre class="mdCode">${esc(fences[+i])}</pre>`);
  return s;
}

            "text/plain": new Blob([it.body], {type:"text/plain"}),
          })]);
        } else {
          await navigator.clipboard.writeText(it.body);

      } catch(err){ await navigator.clipboard.writeText(it.body); }
      const btn = card.querySelector("[data-copy]"), pre = card.querySelector(".libBody");
      btn.textContent = "✓ Copied"; pre.classList.add("flash");
      setTimeout(()=>{ btn.textContent = "Copy"; pre.classList.remove("flash"); }, 1200);
    };
    card.querySelector("[data-copy]").onclick = doCopy;
    card.querySelector(".libBody").onclick = e => { if(e.target.closest("a")) return; doCopy(); };
    card.querySelector("[data-edit]").onclick = () => libModal(kind, it);
    grid.appendChild(card);

/* ================= export ================= */
async function importCalToLog(d){
  S.calSeen = S.calSeen || {};
  const seen = S.calSeen[d] = S.calSeen[d] || [];
  const cal = await fetchCal(d);
  if(cal.error){ $("#expNotice").style.display=""; $("#expNotice").textContent="Calendar: "+cal.error; return; }
  $("#expNotice").style.display = cal.warn ? "" : "none";
  if(cal.warn) $("#expNotice").textContent = "Calendar: "+cal.warn;
  let changed = false;
  const ignore = (S.settings.ignoreEvents || ["Private Appointment"]).map(x=>x.toLowerCase().trim()).filter(Boolean);
  (cal.events||[]).filter(e=>!e.allDay).forEach(ev=>{
    if(ignore.includes((ev.title||"").toLowerCase().trim())) return;   // skip ignored event titles
    const key = ev.start + "|" + ev.title;
    if(seen.includes(key)) return;                 // already imported (or deleted) - don't resurrect
    seen.push(key);
    const s = new Date(ev.start), en = new Date(ev.end);
    S.timelog.push({ id:uid(), date:d, label:ev.title, taskId:null, source:"cal", category:"meeting",
      start: pad(s.getHours())+":"+pad(s.getMinutes()), end: pad(en.getHours())+":"+pad(en.getMinutes()),
      minutes: Math.max(1, Math.round((en - s)/60000)) });
    changed = true;
  });
  if(changed) markDirty();
}
async function renderExport(){
  const d = $("#expDate").value || todayISO(); $("#expDate").value = d;
  try { await importCalToLog(d); } catch(e){ /* calendar issues shouldn't blank the table */ }
  const entries = S.timelog.filter(e=>e.date===d).sort((a,b)=>a.start.localeCompare(b.start));
  const tb = $("#entryRows"); tb.innerHTML = "";
  entries.forEach(e=>{
    const c = entCat(e);
    const tr = document.createElement("tr");
    tr.innerHTML = `<td><div class="labCell"><span title="${e.source==="cal"?"from calendar":"task/timer entry"}">${e.source==="cal"?"📅":"📋"}</span><input value="${esc(e.label)}"></div></td>
      <td><select>${allCats().map(cc=>`<option value="${cc.k}"${c===cc.k?" selected":""}>${esc(cc.label)}</option>`).join("")}</select></td>
      <td><input type="time" value="${e.start}"></td><td><input type="time" value="${e.end}"></td>
      <td><input type="number" min="1" value="${e.minutes}"></td>

    const [lab, st, en, mi] = tr.querySelectorAll("input"), catSel = tr.querySelector("select");
    const saveBtn = tr.querySelector("[data-save]");
    const dirtyRow = () => { saveBtn.disabled = false; tr.classList.add("rowDirty"); };
    // auto-fill minutes from start/end while typing, but DON'T re-render (no jump)
    const syncMins = () => { const diff = hmToMin(en.value) - hmToMin(st.value); if(diff > 0) mi.value = diff; };
    lab.oninput = dirtyRow; catSel.onchange = dirtyRow; mi.oninput = dirtyRow;
    st.oninput = () => { syncMins(); dirtyRow(); };
    en.oninput = () => { syncMins(); dirtyRow(); };
    const commit = () => {
      e.label = lab.value; e.category = catSel.value;
      e.start = st.value; e.end = en.value; e.minutes = +mi.value || 1;
      markDirty(); renderExport();          // re-sort + refresh totals only on Save
    };
    saveBtn.onclick = commit;
    // Enter in any field of the row saves it
    tr.querySelectorAll("input").forEach(inp => inp.addEventListener("keydown", ev => { if(ev.key==="Enter") commit(); }));
    tr.querySelector("[data-del]").onclick = () => { S.timelog = S.timelog.filter(x=>x.id!==e.id); markDirty(); renderExport(); };
    tb.appendChild(tr);
  });
  const round = +S.settings.rounding || 1;
  const rnd = m => Math.max(round, Math.round(m/round)*round);
  let out;
  const dateHdr = new Date(d+"T12:00").toLocaleDateString(undefined,{weekday:"long",day:"2-digit",month:"long",year:"numeric"});
  if($("#expRaw").checked){
    const agg = {};
    entries.forEach(e=>{ agg[e.label] = (agg[e.label]||0) + e.minutes; });
    out = dateHdr+"\n"+Object.entries(agg).map(([label,m])=>`- ${ascii(label)} - ${fmtDur(rnd(m))}`).join("\n");
  } else {
    out = dateHdr+"\n"+entries.map(e=>`${e.start}-${e.end}  ${ascii(e.label)} - ${fmtDur(rnd(e.minutes))}`).join("\n");
  }
  if(entries.length){
    const first = Math.min(...entries.map(e=>hmToMin(e.start)));
    const last = Math.max(...entries.map(e=>hmToMin(e.end)));
    out += `\nTotal: ${fmtDur(Math.max(0, last - first))} (${minToHM(first)}-${minToHM(last)})`;
  } else out += "No entries.";
  $("#exportText").textContent = out;
}

let bulkRows = [];
async function bulkGenerate(){
  const f = $("#bulkFrom").value, t = $("#bulkTo").value;
  if(!f || !t || f > t){ alert("Pick a valid from/to range."); return; }
  // Deliberately does NOT re-fetch/re-import the calendar for each day here -
  // whatever's already in a day's Entries screen is treated as final (you may
  // have corrected a meeting that ran over/under, or removed one entirely,
  // and a bulk report is not the place to second-guess that). Visiting the
  // Export tab for a given day is what syncs its calendar entries in the
  // first place; a day never visited simply won't have any calendar-derived
  // rows here yet.
  const round = +S.settings.rounding || 1;
  const rnd = m => Math.max(round, Math.round(m/round)*round);
  // one row per entry with its own times, sorted by date then start
  bulkRows = S.timelog
    .filter(e => e.date >= f && e.date <= t)
    .sort((a,b) => (a.date+a.start).localeCompare(b.date+b.start))
    .map(e => [e.date, e.start, e.end, ascii(e.label), catName(entCat(e)), fmtDur(rnd(e.minutes))]);
  const header = ["Date","Start","End","Task","Category","Time"];
  $("#bulkText").textContent = bulkRows.length
    ? header.join("\t") + "\n" + bulkRows.map(r=>r.join("\t")).join("\n")
    : "No entries in range.";
}
$("#bulkGen").onclick = bulkGenerate;
$("#bulkCopy").onclick = async () => {
  await navigator.clipboard.writeText($("#bulkText").textContent);
  $("#bulkCopy").textContent = "Copied ✓"; setTimeout(()=>$("#bulkCopy").textContent="Copy",1500);
};
$("#bulkCsv").onclick = () => {
  if(!bulkRows.length){ alert("Generate first."); return; }
  const q = s => `"${String(s).replace(/"/g,'""')}"`;
  const csv = "Date,Start,End,Task,Category,Time\n" + bulkRows.map(r=>r.map(q).join(",")).join("\n");
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob(["\uFEFF"+csv], {type:"text/csv;charset=utf-8"}));
  a.download = `timesheet_${$("#bulkFrom").value}_${$("#bulkTo").value}.csv`;
  document.body.appendChild(a); a.click(); a.remove();

};

// Splits on grapheme clusters (not UTF-16 code units), so a ZWJ sequence or
// skin-tone-modified emoji is treated as the single glyph it visually is.
// Falls back to Array.from (code-point-aware, but not ZWJ-aware) on browsers
// without Intl.Segmenter - a minor degradation, not a crash.
function graphemesOf(str){
  if(window.Intl && Intl.Segmenter){
    return [...new Intl.Segmenter(undefined, {granularity:"grapheme"}).segment(str)].map(s=>s.segment);
  }
  return Array.from(str);
}
const EMOJI_RE = /\p{Extended_Pictographic}/u;
// U+FE0F (variation selector-16) is optional on many emoji - strip it before
// lookup so "🗑️" (with VS16) and "🗑" (without) both resolve.
const emojiToTag = g => EMOJI_TO_TAG[g] || EMOJI_TO_TAG[g.replace(/\uFE0F/g,"")] || null;
// Up to 10 shortcodes, deduped, in the order they were parsed.
function parseQuickTagsInput(str){
  const out = [];
  for(const g of graphemesOf(str||"")){
    if(!EMOJI_RE.test(g)) continue;
    const tag = emojiToTag(g);
    if(tag && !out.includes(tag)) out.push(tag);
    if(out.length >= 10) break;
  }
  return out;
}

function fmtWhen(ts){

  if(isoOf(d) === isoOf(now)) return "Today "+time;
  if(isoOf(d) === isoOf(new Date(now.getTime()+86400000))) return "Tomorrow "+time;
  return d.toLocaleDateString(undefined,{day:"numeric",month:"short"})+" "+time;
}
function fmtInterval(type, val){
  const map = {hours:"hr", days:"day", weeks:"wk", months:"mo"};

}

// Paste/type a single emoji -> auto-converts to its ntfy shortcode. If more
// than one emoji is pasted, only the first is kept (graphemesOf().find below).
// An emoji outside EMOJI_TO_TAG is rejected with a hint rather than silently
// sent - a raw glyph in the Tags header would just vanish (ntfy tags are
// ASCII shortcodes, not literal emoji).
$("#remTag").addEventListener("input", e => {
  const raw = e.target.value;
  if(!raw){ $("#remTagWarn").style.display = "none"; setTagPreview(""); return; }
  if(EMOJI_RE.test(raw)){
    const g = graphemesOf(raw).find(x => EMOJI_RE.test(x));
    const tag = g && emojiToTag(g);
    if(tag){
      e.target.value = tag; $("#remTagWarn").style.display = "none"; setTagPreview(tag);
    } else {
      e.target.value = "";
      $("#remTagWarn").textContent = "Emoji not recognized - try typing a shortcode (e.g. alarm_clock), or pick one below.";
      $("#remTagWarn").style.display = "";
      setTagPreview("");
    }
    return;
  }
  $("#remTagWarn").style.display = "none";
  setTagPreview(raw.trim());
});

$("#remSave").onclick = async () => {
  const msg = $("#remMsg").value.trim();
  if(!msg){ remStatus("Message is required", true); return; }
  if(!$("#remDate").value || !$("#remTime").value){ remStatus("Pick a date and time", true); return; }
  const when = new Date(`${$("#remDate").value}T${$("#remTime").value}`);
  if(isNaN(when)){ remStatus("Invalid date/time", true); return; }
  const recurring = $("#remRecur").checked;
  // A past time on a recurring reminder is fine (the dispatcher rolls it
  // forward to the next occurrence); on a one-off it would just fire instantly.
  if(!recurring && when.getTime() < Date.now()-60000){ remStatus("That time is in the past", true); return; }
  const payload = { message: msg, priority: +$("#remPrio").value,
    tag: $("#remTag").value.trim() || "alarm_clock",
    next_fire: Math.floor(when.getTime()/1000), recurring,
    interval_type: recurring ? $("#remIntType").value : null,
    interval_value: recurring ? +$("#remIntVal").value : null };
  const url = remEditing ? "/api/reminders/"+remEditing : "/api/reminders";
  const r = await fetch(url, {method: remEditing?"PUT":"POST",
    headers:{"Content-Type":"application/json"}, body: JSON.stringify(payload)});
  const j = await r.json().catch(()=>({}));
  if(!r.ok){ remStatus(j.error || "Save failed", true); return; }
  remStatus(remEditing ? "Saved ✓" : "Scheduled ✓");
  remFormReset(); await loadReminders(); renderNotif();
};

/* Mirrors a pop-up reminder to ntfy. Fire-and-forget: a failed push must
   never block or break the pop-up itself, which is the primary reminder. */
async function pushNtfy(message, title, tag, priority){
  if(!S.settings.ntfyTasks || !ntfyConfigured()) return;
  try {
    await fetch("/api/ntfy/send", {method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({message, title, tag, priority: priority||3})});
  } catch(e){ /* offline or server down - the pop-up already showed */ }
}
