          <input id="sLunchStart" type="time" value="${s.lunchStart||""}"><input id="sLunchEnd" type="time" value="${s.lunchEnd||""}">
        </div>
        <span class="small muted">"Auto" will skip over this window. Leave both blank for no lunch block.</span></div>
      <div class="fRow"><label>Round export durations to (minutes)</label><input id="sRound" type="number" min="1" value="${s.rounding||5}"></div>`)}
    ${sec("Reminders", `
      <div class="fRow"><label>Slotted-task reminders</label>
        <div style="display:flex;gap:10px;align-items:center">
          <label class="small"><input type="checkbox" id="sRemind"${s.remind!==false?" checked":""}> enabled</label>
          <input id="sLead" type="number" min="0" max="120" value="${s.remindLead||0}" style="width:70px">
          <span class="small muted">min before slot time</span>
        </div></div>
      <div class="fRow"><label>Calendar meeting reminders</label>
        <label class="small"><input type="checkbox" id="sRemindMeetings"${s.remindMeetings?" checked":""}> enabled</label>
        <span class="small muted">Also remind you before calendar meetings start, using the same lead time as above. Ignored-event titles are skipped.</span></div>
      <div class="fRow"><label>Browser notifications</label>
        <div style="display:flex;gap:10px;align-items:center">
          <label class="small"><input type="checkbox" id="sBrowserNotif"${s.browserNotifications?" checked":""}> enabled</label>
          <span class="small muted" id="notifPermNote"></span>
        </div>
        <span class="small muted">Also fires a system notification when a reminder is due - useful if the tab isn't in front. Needs your browser's permission.</span></div>`)}
    ${sec("Notifications &amp; ntfy", `
      <div class="fRow"><label>ntfy server URL</label>
        <input id="sNtfyUrl" value="${esc(s.ntfyUrl||"https://ntfy.sh")}" placeholder="https://ntfy.sh">
        <span class="small muted">Public ntfy.sh, or your own self-hosted server.</span></div>
      <div class="fRow"><label>Topic</label>
        <input id="sNtfyTopic" value="${esc(s.ntfyTopic||"")}" placeholder="my-timepilot-a7f3c2">
        <span class="small muted">Anyone who knows a topic name can read and post to it - use something long and unguessable, and subscribe to it in the ntfy app.</span></div>
      <div class="fRow"><label>Notification icon URL (optional)</label>
        <input id="sNtfyIcon" value="${esc(s.ntfyIcon||"")}" placeholder="https://example.com/icon.png">
        <span class="small muted">A .png URL shown as the notification's icon.</span></div>
      <div class="fRow"><label>Push task &amp; meeting reminders to ntfy</label>
        <label class="small"><input type="checkbox" id="sNtfyTasks"${s.ntfyTasks?" checked":""}> enabled</label>
        <span class="small muted">Sends an ntfy push alongside each pop-up reminder above. Needs a tab open - scheduled reminders on the <strong>Notifications</strong> tab are sent by the server and don't.</span></div>
      <div class="fRow"><label>Quick-pick tags (up to 10)</label>
        <input id="sQuickTags" value="${(s.quickTags&&s.quickTags.length?s.quickTags:DEFAULT_QUICK_TAGS).map(t=>NTFY_TAG_EMOJI[t]||"").join("")}"
          placeholder="Paste up to 10 emoji, e.g. ⏰📬🚨📅💻🔐🗑️🍃😊✅">
        <div class="quickTagRow" id="sQuickPreview"></div>
        <span class="small muted">Shown as quick buttons on the Notifications tab's Tag field. Unrecognized emoji are skipped.</span></div>
      <div class="fRow">
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <button id="sNtfyTest" type="button">Send test notification</button>
          <span class="small muted" id="sNtfyStatus"></span>
        </div></div>`)}
    ${sec("Categories &amp; timers", `
      <div class="fRow"><label>Task categories</label><div id="sCats"></div>
        <button id="sCatAdd" class="ghost small" type="button">+ Add category</button></div>
      <div class="fRow"><label>Interrupt quick-timers (one per line)</label><textarea id="sInt" rows="4">${esc((s.interrupts||[]).join("\n"))}</textarea></div>
      <div class="fRow"><label>Forgot to hit Start?</label>
        <label class="small"><input type="checkbox" id="sSyncLastEnd"${s.syncLastTaskEnd!==false?" checked":""}> when I correct a timer's start time, adjust the previous task to match</label>
        <span class="small muted">Backdating a timer's start (via the running-timer label → edit) moves the previous logged task's end time to line up with it, so there's no unlogged gap between them. Only ever pulls that boundary - it won't touch anything else in the timesheet.</span></div>`)}
    ${sec("Calendar", `
      <div class="fRow"><label>Exchange published calendar ICS URL</label><input id="sIcs" value="${esc(s.icsUrl||"")}" placeholder="https://outlook.office365.com/owa/calendar/.../calendar.ics"></div>
      <div class="fRow"><label>...or upload a .ics file (used as fallback if the URL is empty or unreachable)</label>
        <input type="file" id="sIcsFile" accept=".ics,text/calendar">
        <span class="small muted" id="sIcsStatus"></span></div>
      <div class="fRow"><label>Ignore calendar events with these titles (one per line - not logged)</label><textarea id="sIgnore" rows="2">${esc((s.ignoreEvents||["Private Appointment"]).join("\n"))}</textarea></div>`)}
    ${sec("Backup", `
      <div class="fRow"><label>Export / import</label>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <button id="sExport" type="button">⬇ Export data</button>
          <label class="ghost small" style="padding:5px 10px;border:1px solid var(--line);border-radius:7px;cursor:pointer">
            ⬆ Import data<input type="file" id="sImportFile" accept=".json,application/json" style="display:none">
          </label>
          <span class="small muted" id="sImportStatus"></span>
        </div>
        <span class="small muted">Export downloads a JSON file with all your tasks, notes, snippets, clipboard items, reminders, and settings. Import <strong>replaces</strong> everything currently in your account with the contents of a previously exported file.</span></div>`)}
    </div>
    <div class="mActions"><button id="mCancel">Cancel</button><button class="primary" id="mSave">Save</button></div>`);
  $("#modalBox").classList.add("settings");
  $("#sTheme").onchange = e => document.body.dataset.theme = e.target.value;
  $("#sFont").onchange = e => document.body.dataset.font = e.target.value;
  // --- ntfy test: posts the values currently in the form, so you can verify
  // before committing them with Save ---
  $("#sNtfyTest").onclick = async () => {
    const st = $("#sNtfyStatus");
    if(!$("#sNtfyTopic").value.trim()){ st.textContent = "Set a topic first"; st.className = "small errText"; return; }
    st.textContent = "Sending..."; st.className = "small muted";
    try {
      const r = await fetch("/api/ntfy/send", {method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ message:"TimePilot test notification - if you can read this, it works.",
          title:"TimePilot", tag:"white_check_mark",
          ntfyUrl:$("#sNtfyUrl").value.trim(), ntfyTopic:$("#sNtfyTopic").value.trim(),
          ntfyIcon:$("#sNtfyIcon").value.trim() })});
      const j = await r.json().catch(()=>({}));
      if(r.ok){ st.textContent = "Sent ✓ check your device"; st.className = "small muted"; }
      else { st.textContent = j.error || "Send failed"; st.className = "small errText"; }
    } catch(e){ st.textContent = "Send failed"; st.className = "small errText"; }
  };
  // --- quick-pick tags: live preview of which pasted emoji were recognized ---
  const drawQuickPreview = () => {
    const tags = parseQuickTagsInput($("#sQuickTags").value);
    const box = $("#sQuickPreview");
    box.innerHTML = tags.length
      ? tags.map(t=>`<button type="button" disabled title="${t}">${NTFY_TAG_EMOJI[t]}</button>`).join("")
      : `<span class="qtEmpty">No emoji recognized yet.</span>`;
  };
  $("#sQuickTags").addEventListener("input", drawQuickPreview);
  drawQuickPreview();
  // --- backup: export downloads a JSON snapshot; import replaces everything ---
  $("#sExport").onclick = async () => {
    const r = await fetch("/api/export");
    if(!r.ok){ alert("Export failed."); return; }
    const data = await r.json();
    const stamp = new Date().toISOString().slice(0,10);
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([JSON.stringify(data, null, 1)], {type:"application/json"}));
    a.download = `timepilot-export-${data.username}-${stamp}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href), 5000);
  };
  $("#sImportFile").onchange = async e => {
    const file = e.target.files[0]; if(!file) return;
    const status = $("#sImportStatus");
    const fail = msg => { status.textContent = msg; status.classList.add("errText"); e.target.value = ""; };
    status.classList.remove("errText");
    let parsed;
    try { parsed = JSON.parse(await file.text()); }
    catch(err){
      const head = new Uint8Array(await file.slice(0,2).arrayBuffer());
      if(head[0]===0x50 && head[1]===0x4B){ fail("That's a .zip file - this expects the JSON file downloaded by \"Export data\"."); return; }
      fail("Not a valid JSON file."); return;
    }
    if(parsed.app !== "timepilot"){ fail("Not a TimePilot export file."); return; }
    const counts = Object.entries(parsed.state||{})
      .filter(([k,v])=>Array.isArray(v)).map(([k,v])=>`${v.length} ${k}`).join(", ");
    if(!confirm(`Import this file? This REPLACES everything currently in your account (${counts}) and cannot be undone.`)){
      e.target.value = ""; return;
    }
    status.textContent = "Importing...";
    const r = await fetch("/api/import", {method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(parsed)});
    const j = await r.json();
    if(!r.ok){ fail(j.error || "Import failed."); return; }
    status.textContent = "Restored ✓ reloading...";
    setTimeout(() => location.reload(), 700);   // simplest correct way to resync every view with the replaced data
  };
  // --- browser notifications: reflect + request permission on toggle ---
  const notifSupported = "Notification" in window;
  const notifBox = $("#sBrowserNotif"), notifNote = $("#notifPermNote");
  const renderNotifNote = () => {
    if(!notifSupported){ notifNote.textContent = "not supported in this browser"; notifBox.disabled = true; notifBox.checked = false; return; }
    if(Notification.permission === "denied") notifNote.textContent = "blocked - allow notifications for this site in your browser settings";
    else if(Notification.permission === "granted") notifNote.textContent = "permission granted";
    else notifNote.textContent = "will ask for permission when enabled";
  };
  renderNotifNote();
  notifBox.onchange = async () => {
    if(!notifBox.checked) return;               // turning off never needs permission
    if(!notifSupported){ notifBox.checked = false; return; }
    if(Notification.permission === "granted"){ renderNotifNote(); return; }
    const perm = await Notification.requestPermission();
    if(perm !== "granted") notifBox.checked = false;
    renderNotifNote();
  };
  // --- category manager (works on a copy; applied on Save) ---
  const catsWork = getCats().map(c=>({...c}));
  function drawCats(){
    const box = $("#sCats"); box.innerHTML = "";
    catsWork.forEach((c,i)=>{
      const row = document.createElement("div");
      row.style.cssText = "display:flex;gap:6px;align-items:center;margin-bottom:5px";
      row.innerHTML = `<input maxlength="20" value="${esc(c.label)}" style="flex:1;min-width:0">
        <input type="color" value="${safeColor(c.color)}" style="width:40px;height:30px;padding:2px">
        <button type="button" class="ghost small danger"${catsWork.length<2?" disabled":""}>✕</button>`;
      const [lab, col] = row.querySelectorAll("input");
      lab.onchange = () => c.label = lab.value.trim().slice(0,20) || c.label;
      col.oninput = () => c.color = col.value;
      row.querySelector("button").onclick = () => { catsWork.splice(i,1); drawCats(); };
      box.appendChild(row);
    });
  }
  drawCats();
  $("#sCatAdd").onclick = () => { catsWork.push({k:"c_"+uid(), label:"New category", color:"#57b76a"}); drawCats(); };
  $("#sIcsFile").onchange = async e => {
    const file = e.target.files[0]; if(!file) return;
    const { token } = await (await fetch("/api/csrf-token")).json();
    const r = await fetch("/api/calendar/upload", {method:"POST", headers:{"X-CSRFToken":token}, body: await file.text()});
    const j = await r.json();
    $("#sIcsStatus").textContent = j.ok ? `Uploaded ✓ (${Math.round(j.size/1024)} KB)` : (j.error || "Upload failed");
    calCache = {};
  };
  $("#mSave").onclick = async () => {
    const lunchStart = $("#sLunchStart").value, lunchEnd = $("#sLunchEnd").value;
    if(lunchStart && lunchEnd && hmToMin(lunchEnd) <= hmToMin(lunchStart)){
      alert("Lunch end time must be after lunch start time."); return;
    }
    Object.assign(s, { icsUrl:$("#sIcs").value.trim(), theme:$("#sTheme").value, font:$("#sFont").value,
      dayStart:$("#sStart").value, dayEnd:$("#sEnd").value, rounding:+$("#sRound").value||5,
      viewStart:$("#sViewStart").value, viewEnd:$("#sViewEnd").value,
      lunchStart, lunchEnd,
      remind:$("#sRemind").checked, remindLead:+$("#sLead").value||0,
      syncLastTaskEnd:$("#sSyncLastEnd").checked,
      remindMeetings:$("#sRemindMeetings").checked,
      browserNotifications:$("#sBrowserNotif").checked,
      ntfyUrl:$("#sNtfyUrl").value.trim(), ntfyTopic:$("#sNtfyTopic").value.trim(),
      ntfyIcon:$("#sNtfyIcon").value.trim(), ntfyTasks:$("#sNtfyTasks").checked,
      quickTags: parseQuickTagsInput($("#sQuickTags").value),
      interrupts:$("#sInt").value.split("\n").map(x=>x.trim()).filter(Boolean),
      ignoreEvents:$("#sIgnore").value.split("\n").map(x=>x.trim()).filter(Boolean),
      categories: catsWork });
    const valid = new Set(catsWork.map(c=>c.k));
    S.tasks.forEach(t=>{ if(!valid.has(t.category)) t.category = defCat(); });
    S.timelog.forEach(e=>{ if(e.category && e.category!=="meeting" && !valid.has(e.category)) e.category = defCat(); });
    calCache = {}; markDirty();
    await persist();   // wait for the actual write to land - Settings Save is a deliberate action, not
                        // something that should still be sitting in the 600ms auto-save debounce when
                        // the modal closes and the user immediately checks Today/Export against the server
    applySettings(); closeModal(); renderStrip();
    if(view==="board") renderBoard();
    if(view==="today") renderToday(); if(view==="export") renderExport();
    if(view==="notif") renderNotif();
  };
  $("#mCancel").onclick = () => { applySettings(); closeModal(); };
};
function openModal(html){ $("#modalBox").innerHTML = html; $("#modal").classList.add("open"); }
function closeModal(){ $("#modal").classList.remove("open"); $("#modalBox").classList.remove("settings"); }
$("#modal").onclick = e => { if(e.target.id==="modal") closeModal(); };

/* ================= nav ================= */
document.querySelectorAll("nav .tab").forEach(b=>{
  b.onclick = () => setView(b.dataset.view);
});
function setView(v){
  view = v;
  document.querySelectorAll("nav .tab").forEach(b=>b.classList.toggle("on", b.dataset.view===v));
  ["board","today","notes","snips","paste","notif","export"].forEach(x=>$("#view-"+x).style.display = x===v? "":"none");
  if(v==="board") renderBoard();
  if(v==="today") renderToday();
  if(v==="notes") renderNotes();
  if(v==="snips"||v==="paste") renderLib(v);
  if(v==="notif"){ remFormReset(); loadReminders().then(renderNotif); }
  if(v==="export") renderExport();
}
function renderAll(){ renderStrip(); setView(view); }

/* ================= slotted-task reminders ================= */
function checkReminders(){
  if(!S || $("#modal").classList.contains("open")) return;   // don't interrupt an open dialog; retries next tick
  if(S.settings.remind !== false) checkTaskReminders();
  if(S.settings.remindMeetings) checkMeetingReminders();
}
function checkTaskReminders(){
  const lead = +S.settings.remindLead || 0;
  const now = hmToMin(hmNow());
  const today = todayISO();
  // Fire only inside a window: from (slot - lead) up to (slot + GRACE) minutes.
  // Past that grace period the reminder is considered missed and won't pop -
  // so opening the app late doesn't dump every earlier task on you.
  const GRACE = 10;
  const due = S.tasks.find(t => {
    if(t.column !== "today" || !t.slot) return false;
    if(t.reminded === today+" "+t.slot) return false;          // already shown for this slot today
    if(S.activeTimer && S.activeTimer.taskId === t.id) return false;
    const at = hmToMin(t.slot);
    return now >= at - lead && now <= at + GRACE;              // only within the window
  });
  if(!due) return;
  due.reminded = today+" "+due.slot; markDirty();
  const taskBody = `Slotted for ${due.slot} · ${catName(due.category)} · ${due.est||30}m`;
  fireBrowserNotification("⏰ Task due: "+due.title, taskBody, "task-"+due.id);
  pushNtfy(taskBody, "⏰ Task due: "+due.title, "alarm_clock", 4);
  reminderModal(due);
}

// Meetings live in the calendar, not S.tasks, so "already reminded" can't be
// stored on the task. It's kept in memory only: a page reload inside the same
// short window may re-pop a meeting, which is a fair trade against writing
// per-meeting flags into saved state on every tick.
const metReminded = new Set();
let metCalAt = 0;
async function checkMeetingReminders(){
  const today = todayISO();
  // Can't rely on renderToday having run - you might sit on the Board tab all
  // day. Fetch it here, refreshing every 10 min so meetings added after the
  // first load still get a reminder. The server caches ICS for 5 min anyway,
  // so this is cheap.
  if(!calCache[today] || Date.now() - metCalAt > 600000){
    metCalAt = Date.now();
    try { await fetchCal(today, !!calCache[today]); } catch(e){ return; }
  }
  const cal = calCache[today];
  if(!cal || !cal.events) return;
  const lead = +S.settings.remindLead || 0;
  const now = hmToMin(hmNow());
  const GRACE = 10;
  const ignore = (S.settings.ignoreEvents || ["Private Appointment"]).map(x=>x.toLowerCase().trim()).filter(Boolean);
  const due = cal.events.find(ev => {
    if(ev.allDay) return false;
    const title = (ev.title||"").toLowerCase();
    if(ignore.some(x => title.includes(x))) return false;
    const at = new Date(ev.start);
    if(isoOf(at) !== today) return false;
    const atM = at.getHours()*60 + at.getMinutes();
    if(metReminded.has(today+"|"+ev.title+"|"+ev.start)) return false;
    return now >= atM - lead && now <= atM + GRACE;
  });
  if(!due) return;
  if($("#modal").classList.contains("open")) return;   // re-check: we awaited above
  metReminded.add(today+"|"+due.title+"|"+due.start);
  const at = new Date(due.start);
  const hm = pad(at.getHours())+":"+pad(at.getMinutes());
  const body = `Starts at ${hm}${due.location?" · "+due.location:""}`;
  fireBrowserNotification("📅 Meeting: "+due.title, body, "cal-"+due.start);
  pushNtfy(body, "📅 Meeting: "+due.title, "calendar", 4);
  meetingModal(due, hm);
}
function meetingModal(ev, hm){
  openModal(`<h3>📅 Meeting: ${esc(ev.title)}</h3>
    <p class="muted small" style="margin-bottom:14px">Starts at ${esc(hm)}${ev.location?" · "+esc(ev.location):""}</p>
    <div class="mActions" style="justify-content:flex-start;flex-wrap:wrap">
      <button class="primary" id="rStart">▶ Start timer</button>
      <button class="ghost" id="rDismiss">Dismiss</button></div>`);
  $("#rStart").onclick = () => { startTimer(ev.title, null, "meeting"); closeModal(); };
  $("#rDismiss").onclick = closeModal;
}
function fireBrowserNotification(title, body, key){
  if(!S.settings.browserNotifications) return;
  if(!("Notification" in window) || Notification.permission !== "granted") return;
  try{
    const n = new Notification(title, {
      body,
      icon: "/static/favicon.png",
      tag: "timepilot-reminder-"+key,   // replaces any earlier notification for the same item rather than stacking
    });
    n.onclick = () => { window.focus(); n.close(); };
  } catch(e){ /* some browsers reject construction outside a user gesture in edge cases - the modal still shows either way */ }
}
function reminderModal(t){
  openModal(`<h3>⏰ Task due: ${esc(t.title)}</h3>
    <p class="muted small" style="margin-bottom:14px">Slotted for ${t.slot} · ${esc(catName(t.category))} · ${t.est||30}m estimate</p>
    <div class="mActions" style="justify-content:flex-start;flex-wrap:wrap">
      <button class="primary" id="rStart">▶ Start now</button>
      <button id="r15">+15m</button><button id="r30">+30m</button><button id="r60">+1h</button>
      <button class="ghost" id="rDismiss">Dismiss</button></div>`);
  $("#rStart").onclick = () => { startTimer(t.title, t.id); closeModal(); };
  const push = mins => () => {
    const endM = hmToMin(S.settings.dayEnd||"18:00");
    // push from whichever is later - the slot or now - so a late push always
    // lands in the future, which means (now < newSlot - lead) and the window
    // check won't re-fire until that new time actually arrives.
    let m = Math.max(hmToMin(t.slot), hmToMin(hmNow())) + mins;
    m = Math.min(endM - (t.est||30), m);
    t.slot = minToHM(m);
    t.reminded = null;    // re-arm: it will fire again when the new slot time arrives
    markDirty(); closeModal(); if(view==="today") renderToday();
  };
  $("#r15").onclick = push(15); $("#r30").onclick = push(30); $("#r60").onclick = push(60);
  $("#rDismiss").onclick = closeModal;
}
setInterval(checkReminders, 20000);

let _rzT, _rzW = window.innerWidth;
window.addEventListener("resize", () => {
  clearTimeout(_rzT);
  _rzT = setTimeout(()=>{
    // A resize can fire just from a mobile on-screen keyboard opening (typing
    // into a time/text field changes the visual viewport height) - re-rendering
    // in that moment would wipe out whatever the user is mid-typing, since
    // unslotted-task inputs aren't tied to app state until "Slot" is clicked.
    const ae = document.activeElement;
    if(ae && /^(INPUT|SELECT|TEXTAREA)$/.test(ae.tagName)) return;
    // Mobile browsers also fire "resize" purely from their own address bar
    // collapsing/expanding as you scroll - innerHeight shifts, innerWidth
    // doesn't. Since the timeline's row height is derived from innerHeight
    // (see renderToday), reacting to that made every scroll subtly rescale
    // the whole timeline mid-motion. A real resize - including rotating the
    // device - always changes width too, so that's the signal to act on.
    const w = window.innerWidth, changed = w !== _rzW; _rzW = w;
    if(changed && view==="today") renderToday();
  }, 150);
});

window.addEventListener("beforeunload", () => { if(dirty) persistBeacon(); });
$("#logoutBtn").onclick = async () => {
  if(dirty) await persist();  // don't lose in-flight edits
  const { token } = await (await fetch("/api/csrf-token")).json();
  await fetch("/logout", { method: "POST", headers: { "X-CSRFToken": token } });
  location.href = "/login";
};
loadState();
